<div class="demo">
  <h1>
    Domternal Angular Demo
    <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark() ? 'Switch to light' : 'Switch to dark'">
      {{ isDark() ? '☀️' : '🌙' }}
    </button>
  </h1>

  @if (editor) {
    <domternal-toolbar [editor]="editor" />
  }

  <div style="position: relative;">
    <domternal-editor
      #ec
      [extensions]="extensions"
      [content]="'<p>Hello <strong>World</strong>! Try the toolbar buttons above.</p><pre><code class=&quot;language-javascript&quot;>function greet(name) {\n  const message = `Hello, ${name}!`;\n  console.log(message); // prints greeting\n  return message;\n}</code></pre><p>Code blocks now have <em>syntax highlighting</em>.</p>'"
      (editorCreated)="onEditorCreated($event)"
    />

    @if (editor) {
      <domternal-bubble-menu [editor]="editor">
        <button class="dm-toolbar-button"
          [class.dm-toolbar-button--active]="isMarkActive('bold')"
          [disabled]="!canCommand('toggleBold')"
          title="Bold"
          (mousedown)="$event.preventDefault()"
          (click)="editor!.commands['toggleBold']?.()"
          [innerHTML]="icon('textB')"></button>
        <button class="dm-toolbar-button"
          [class.dm-toolbar-button--active]="isMarkActive('italic')"
          [disabled]="!canCommand('toggleItalic')"
          title="Italic"
          (mousedown)="$event.preventDefault()"
          (click)="editor!.commands['toggleItalic']?.()"
          [innerHTML]="icon('textItalic')"></button>
        <button class="dm-toolbar-button"
          [class.dm-toolbar-button--active]="isMarkActive('underline')"
          [disabled]="!canCommand('toggleUnderline')"
          title="Underline"
          (mousedown)="$event.preventDefault()"
          (click)="editor!.commands['toggleUnderline']?.()"
          [innerHTML]="icon('textUnderline')"></button>
        <button class="dm-toolbar-button"
          [class.dm-toolbar-button--active]="isMarkActive('strike')"
          [disabled]="!canCommand('toggleStrike')"
          title="Strikethrough"
          (mousedown)="$event.preventDefault()"
          (click)="editor!.commands['toggleStrike']?.()"
          [innerHTML]="icon('textStrikethrough')"></button>
        <button class="dm-toolbar-button"
          [class.dm-toolbar-button--active]="isMarkActive('code')"
          [disabled]="!canCommand('toggleCode')"
          title="Code"
          (mousedown)="$event.preventDefault()"
          (click)="editor!.commands['toggleCode']?.()"
          [innerHTML]="icon('code')"></button>
      </domternal-bubble-menu>
    }
  </div>

  <h3>HTML Output</h3>
  <pre class="output">{{ ec.htmlContent() }}</pre>
</div>
