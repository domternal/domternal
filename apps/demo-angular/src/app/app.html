<div class="demo">
  <h1>Domternal Angular Demo</h1>

  <div class="toolbar">
    <button
      (click)="toggleBold()"
      [class.active]="isBoldActive"
      title="Toggle Bold (Cmd+B)"
    >
      <strong>B</strong>
    </button>
  </div>

  <domternal-editor
    [content]="'<p>Hello <strong>World</strong>! Try selecting text and clicking Bold.</p>'"
    (editorCreated)="onEditorCreated($event)"
    (contentUpdated)="onContentUpdated()"
    (selectionChanged)="onSelectionChanged()"
  />

  <h3>HTML Output</h3>
  <pre class="output">{{ currentHTML }}</pre>
</div>
