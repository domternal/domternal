<div class="demo">
  <h1>
    Domternal Angular Demo
    <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark() ? 'Switch to light' : 'Switch to dark'">
      {{ isDark() ? '☀️' : '🌙' }}
    </button>
  </h1>

  @if (editor(); as ed) {
    <domternal-toolbar [editor]="ed" />
  }

  <div style="position: relative;">
    <domternal-editor
      #ec
      [extensions]="extensions"
      [content]="'<p>Hello <strong>World</strong>! Try the toolbar buttons above.</p><pre><code class=&quot;language-javascript&quot;>function greet(name) {\n  const message = `Hello, ${name}!`;\n  console.log(message); // prints greeting\n  return message;\n}</code></pre><p>Code blocks now have <em>syntax highlighting</em>.</p>'"
      (editorCreated)="onEditorCreated($event)"
    />

    @if (editor(); as ed) {
      <domternal-bubble-menu [editor]="ed"></domternal-bubble-menu>
      <domternal-emoji-picker [editor]="ed" [emojis]="emojiData" />
      <domternal-floating-menu [editor]="ed">
        <button (mousedown)="$event.preventDefault()" (click)="ed.commands.toggleHeading({level: 1})">H1</button>
        <button (mousedown)="$event.preventDefault()" (click)="ed.commands.toggleHeading({level: 2})">H2</button>
        <button (mousedown)="$event.preventDefault()" (click)="ed.commands.toggleBulletList()">List</button>
        <button (mousedown)="$event.preventDefault()" (click)="ed.commands.toggleBlockquote()">Quote</button>
        <button (mousedown)="$event.preventDefault()" (click)="ed.commands.setHorizontalRule()">—</button>
      </domternal-floating-menu>
    }
  </div>

  <h3>HTML Output</h3>
  <pre class="output">{{ ec.htmlContent() }}</pre>
</div>
