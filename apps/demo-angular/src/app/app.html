<div class="demo">
  <h1>
    Domternal Angular Demo
    <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark() ? 'Switch to light' : 'Switch to dark'">
      {{ isDark() ? '☀️' : '🌙' }}
    </button>
  </h1>

  @if (editor) {
    <domternal-toolbar
      [editor]="editor"
      [iconWeight]="isDark() ? 'fill' : 'regular'"
    />
  }

  <domternal-editor
    #ec
    [extensions]="extensions"
    [content]="'<p>Hello <strong>World</strong>! Try the toolbar buttons above.</p>'"
    (editorCreated)="onEditorCreated($event)"
  />

  <h3>HTML Output</h3>
  <pre class="output">{{ ec.htmlContent() }}</pre>
</div>
